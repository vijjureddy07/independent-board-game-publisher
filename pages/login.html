<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/icons/brand-favicon.svg?v=20260411r1" sizes="any" />
  <link rel="shortcut icon" href="../assets/images/icons/brand-favicon.svg?v=20260411r1" type="image/svg+xml" />
  <link rel="manifest" href="../assets/images/icons/site.webmanifest?v=20260411r1" />
  <meta name="theme-color" content="#0B0D0F" />
  <title>Login — TabletopForge</title>
  <meta name="description" content="Log in to your TabletopForge designer studio to track shipments, download PnP files, and access the community forum." />
  <meta name="robots" content="noindex" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css?v=20260412r2" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css?v=20260411r1" />
  <link rel="stylesheet" href="../assets/css/rtl.css?v=20260411r1" />
</head>
<body class="standalone-page">

<!-- Main Content -->
<main id="main-content">
<!-- Auth Layout -->
<section style="min-height:100svh;display:flex;align-items:center;padding:var(--sp-8) var(--sp-6) var(--sp-9);background:
  radial-gradient(ellipse 60% 70% at 80% 20%, rgba(212,245,60,0.025) 0%, transparent 60%),
  var(--bg-primary);">
  <div class="container" style="max-width:420px;">

    <div style="text-align:center;margin-bottom:var(--sp-8);">
      <a href="index.html" class="nav__logo" style="justify-content:center;margin-bottom:var(--sp-4);display:flex;">
        <div class="nav__logo-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 16l-1.447.724a1 1 0 0 0-.553.894V20h12v-2.382a1 1 0 0 0-.553-.894L16 16"/>
            <path d="M8 16V9a4 4 0 0 1 8 0v7"/>
            <path d="M9 9h6"/><circle cx="12" cy="6" r="1"/>
          </svg>
        </div>
        <span class="nav__logo-text">TabletopForge</span>
      </a>
      <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-0.025em;margin-bottom:var(--sp-2);">Designer Login</h1>
      <p style="color:var(--text-secondary);font-size:0.95rem;">Design · Print · Publish · Sell</p>
    </div>

    <form id="login-form" novalidate aria-label="Designer login" style="display:flex;flex-direction:column;gap:var(--sp-5);">

      <div id="fg-email" class="login-field" style="display:flex;flex-direction:column;gap:var(--sp-2);">
        <label for="login-email" style="font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);">Email Address</label>
        <input id="login-email" type="email" required autocomplete="email" placeholder="your@email.com"
          style="background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--r-md);padding:12px var(--sp-4);font-size:0.9rem;color:var(--text-primary);outline:none;min-height:48px;transition:border-color var(--t-fast),box-shadow var(--t-fast);width:100%;font-family:var(--font-body);" />
        <span id="email-error" style="font-size:0.75rem;color:#e05555;display:none;" role="alert">Please enter a valid email address.</span>
      </div>

      <div id="fg-pass" class="login-field" style="display:flex;flex-direction:column;gap:var(--sp-2);">
        <label for="login-password" style="font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);">Password</label>
        <div style="position:relative;">
          <input id="login-password" type="password" required autocomplete="current-password" placeholder="••••••••"
            style="background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--r-md);padding:12px var(--sp-8) 12px var(--sp-4);font-size:0.9rem;color:var(--text-primary);outline:none;min-height:48px;transition:border-color var(--t-fast);width:100%;font-family:var(--font-body);" />
          <button id="pass-toggle" type="button" aria-label="Show password"
            style="position:absolute;right:var(--sp-4);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:var(--sp-1);transition:color var(--t-fast);">
            <i class="fa-solid fa-eye" id="pass-toggle-icon"></i>
          </button>
        </div>
        <span id="pass-error" style="font-size:0.75rem;color:#e05555;display:none;" role="alert">Password must be at least 8 characters.</span>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);flex-wrap:wrap;">
          <label for="remember-me" style="display:inline-flex;align-items:center;gap:var(--sp-2);font-size:0.82rem;color:var(--text-secondary);cursor:pointer;">
            <input id="remember-me" type="checkbox" style="accent-color:var(--accent);width:16px;height:16px;" />
            Remember me
          </label>
          <a href="forgot-password.html" style="font-size:0.82rem;color:var(--text-muted);transition:color var(--t-fast);">Forgot password?</a>
        </div>
      </div>

      <button id="login-submit" class="btn btn--primary" type="submit" style="width:100%;justify-content:center;">
        <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
        Log In
      </button>

      <div id="login-alert" role="alert" aria-live="polite" style="display:none;background:rgba(232,84,84,0.1);border:1px solid rgba(232,84,84,0.3);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4);font-size:0.85rem;color:#e05555;text-align:center;"></div>

      <div style="text-align:center;padding-top:var(--sp-5);border-top:1px solid var(--border);">
        <p style="font-size:0.85rem;color:var(--text-muted);margin:0;">
          New to TabletopForge?
          <a href="create-account.html" style="color:var(--accent);text-decoration:underline;margin-left:4px;">Create account</a>
        </p>
      </div>

    </form>

    <div style="margin-top:var(--sp-7);padding-top:var(--sp-6);border-top:1px solid var(--border);">
      <p style="text-align:center;font-size:0.82rem;color:var(--text-muted);margin-bottom:var(--sp-4);">Or continue with</p>
      <div class="auth-social-grid">
        <button class="btn btn--ghost" type="button" style="width:100%;justify-content:center;padding-inline:var(--sp-3);" onclick="window.location.href='dashboard-user.html'">
          <i class="fa-brands fa-google" aria-hidden="true"></i> Google
        </button>
        <button class="btn btn--ghost" type="button" style="width:100%;justify-content:center;padding-inline:var(--sp-3);" onclick="window.location.href='dashboard-user.html'">
          <i class="fa-brands fa-apple" aria-hidden="true"></i> Apple
        </button>
        <button class="btn btn--ghost" type="button" style="width:100%;justify-content:center;padding-inline:var(--sp-3);" onclick="window.location.href='dashboard-user.html'">
          <i class="fa-brands fa-kickstarter-k" aria-hidden="true"></i> Kickstarter
        </button>
      </div>
    </div>

  </div>
</section>
</main>

<script src="../assets/js/main.js?v=20260412r2"></script>
<script>
(function () {
  'use strict';

  const form        = document.getElementById('login-form');
  const emailInput  = document.getElementById('login-email');
  const passInput   = document.getElementById('login-password');
  const emailErr    = document.getElementById('email-error');
  const passErr     = document.getElementById('pass-error');
  const passToggle  = document.getElementById('pass-toggle');
  const passIcon    = document.getElementById('pass-toggle-icon');
  const submitBtn   = document.getElementById('login-submit');
  const loginAlert  = document.getElementById('login-alert');

  emailInput.addEventListener('blur', () => {
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    emailInput.style.borderColor = valid || !emailInput.value ? '' : '#e05555';
    emailErr.style.display = valid || !emailInput.value ? 'none' : 'block';
  });

  passInput.addEventListener('blur', () => {
    const valid = passInput.value.length >= 8;
    passInput.style.borderColor = valid || !passInput.value ? '' : '#e05555';
    passErr.style.display = valid || !passInput.value ? 'none' : 'block';
  });

  passToggle.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    passIcon.className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    passToggle.setAttribute('aria-label', isPass ? 'Hide password' : 'Show password');
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    loginAlert.style.display = 'none';

    let valid = true;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    if (!emailOk) {
      emailInput.style.borderColor = '#e05555';
      emailErr.style.display = 'block';
      valid = false;
    } else {
      emailInput.style.borderColor = '';
      emailErr.style.display = 'none';
    }

    const passOk = passInput.value.length >= 8;
    if (!passOk) {
      passInput.style.borderColor = '#e05555';
      passErr.style.display = 'block';
      valid = false;
    } else {
      passInput.style.borderColor = '';
      passErr.style.display = 'none';
    }

    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in…';

    setTimeout(() => {
      window.location.href = 'dashboard-user.html';
    }, 900);
  });

})();
</script>
</body>
</html>
