<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TabletopForge</title>
  <meta name="description" content="Log in to your TabletopForge backer dashboard to track shipments, download PnP files, and access the community forum." />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/remaining-pages.css" />
</head>
<body>

<header class="nav scrolled" role="banner">
  <div class="container">
    <nav class="nav__inner" aria-label="Main navigation">
      <a href="../index.html" class="nav__logo" aria-label="TabletopForge Home">
        <div class="nav__logo-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 16l-1.447.724a1 1 0 0 0-.553.894V20h12v-2.382a1 1 0 0 0-.553-.894L16 16"/><path d="M8 16V9a4 4 0 0 1 8 0v7"/><path d="M9 9h6"/><circle cx="12" cy="6" r="1"/></svg>
        </div>
        <span class="nav__logo-text">TabletopForge</span>
      </a>
      <ul class="nav__links" role="list">
        <li class="nav__item"><a href="../index.html" class="nav__link">Home</a></li>
        <li class="nav__item"><a href="../games.html" class="nav__link">Games</a></li>
        <li class="nav__item"><a href="../dashboard-user.html" class="nav__link">Dashboard</a></li>
      </ul>
      <div class="nav__controls">
        <button class="nav__icon-btn" data-theme-toggle aria-label="Toggle theme" type="button"></button>
        <button class="nav__icon-btn" data-rtl-toggle aria-label="Switch RTL" type="button">RTL</button>
      </div>
    </nav>
  </div>
</header>

<main id="main-content">

<!-- Login hero -->
<section style="min-height:100svh;display:flex;align-items:center;padding:var(--nav-h) var(--sp-6) var(--sp-9);background:var(--bg-primary);">
  <div class="container" style="max-width:420px;">
    
    <!-- Logo + heading -->
    <div style="text-align:center;margin-bottom:var(--sp-8);">
      <div class="nav__logo" style="justify-content:center;margin-bottom:var(--sp-4);" aria-label="TabletopForge">
        <div class="nav__logo-mark"></div>
        <span class="nav__logo-text">TabletopForge</span>
      </div>
      <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-0.025em;margin-bottom:var(--sp-2);">Backer Login</h1>
      <p style="color:var(--text-secondary);font-size:0.95rem;">Track orders • Download PnP files • Join forum</p>
    </div>

    <!-- Login form -->
    <form class="login-form" novalidate aria-label="Backer login">
      
      <div class="form-group">
        <label for="login-email" class="form-label">Email Address</label>
        <input id="login-email" class="form-input" type="email" required autocomplete="email" placeholder="your@email.com" />
        <div class="form-error" role="alert">Please enter a valid email address</div>
      </div>

      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <label for="login-password" class="form-label">Password</label>
          <a href="#" class="forgot-link" style="font-size:0.78rem;color:var(--text-muted);">Forgot?</a>
        </div>
        <div style="position:relative;">
          <input id="login-password" class="form-input" type="password" required autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="password-toggle" aria-label="Show password">
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <div class="form-error" role="alert">Password must be at least 8 characters</div>
      </div>

      <button class="btn btn--primary" type="submit" style="width:100%;margin-top:var(--sp-2);">
        <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
        Log In
      </button>

      <div style="text-align:center;margin-top:var(--sp-5);padding-top:var(--sp-5);border-top:1px solid var(--border);">
        <p style="font-size:0.85rem;color:var(--text-muted);margin:0;">
          New backer? <a href="../dashboard-user.html" style="color:var(--accent);">Create account</a>
        </p>
      </div>
    </form>

    <!-- Alternative login -->
    <div style="margin-top:var(--sp-7);padding-top:var(--sp-6);border-top:1px solid var(--border);">
      <p style="text-align:center;font-size:0.82rem;color:var(--text-muted);margin-bottom:var(--sp-4);">
        Or sign in with:
      </p>
      <div style="display:flex;gap:var(--sp-2);">
        <button class="btn btn--ghost" type="button" style="flex:1;">
          <i class="fa-brands fa-kickstarter-k" aria-hidden="true"></i>
          Kickstarter
        </button>
        <button class="btn btn--ghost" type="button" style="flex:1;">
          <i class="fa-brands fa-google" aria-hidden="true"></i>
          Google
        </button>
      </div>
    </div>

  </div>
</section>

</main>

<script src="../assets/js/main.js"></script>
<script>
// Form validation + UX
const form = $('.login-form');
const email = $('#login-email');
const password = $('#login-password');
const toggle = $('.password-toggle');
const errors = _$$('.form-error');

form.addEventListener('submit', e => {
  e.preventDefault();
  
  let valid = true;
  
  // Reset
  _$$('.form-group').forEach(g => g.classList.remove('invalid'));
  errors.forEach(e => e.textContent = '');
  
  // Email
  const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
  if (!emailValid) {
    email.parentElement.parentElement.classList.add('invalid');
    errors[0].textContent = 'Please enter a valid email address';
    valid = false;
  }
  
  // Password
  if (password.value.length < 8) {
    password.parentElement.parentElement.classList.add('invalid');
    errors[1].textContent = 'Password must be at least 8 characters';
    valid = false;
  }
  
  if (valid) {
    // Simulate login → redirect to dashboard
    setTimeout(() => {
      window.location.href = '../dashboard-user.html';
    }, 800);
  }
});

// Password visibility toggle
toggle.addEventListener('click', () => {
  const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
  password.setAttribute('type', type);
  toggle.querySelector('i').classList.toggle('fa-eye');
  toggle.querySelector('i').classList.toggle('fa-eye-slash');
  toggle.setAttribute('aria-label', type === 'text' ? 'Hide password' : 'Show password');
});
</script>
</body>
</html>
