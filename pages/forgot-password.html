<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/icons/brand-favicon.svg?v=20260411r1" sizes="any" />
  <link rel="shortcut icon" href="../assets/images/icons/brand-favicon.svg?v=20260411r1" type="image/svg+xml" />
  <link rel="manifest" href="../assets/images/icons/site.webmanifest?v=20260411r1" />
  <meta name="theme-color" content="#0B0D0F" />
  <title>Reset Password - TabletopForge</title>
  <meta name="description" content="Request a TabletopForge password reset link for your designer account." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css?v=20260411r2" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css?v=20260411r1" />
  <link rel="stylesheet" href="../assets/css/rtl.css?v=20260411r1" />
  </head>
<body class="standalone-page">
<main id="main-content">
<section style="min-height:100svh;display:flex;align-items:center;padding:var(--sp-8) var(--sp-6) var(--sp-9);background:radial-gradient(ellipse 60% 70% at 80% 20%, rgba(212,245,60,0.025) 0%, transparent 60%), var(--bg-primary);">
  <div class="container" style="max-width:420px;">
    <div style="text-align:center;margin-bottom:var(--sp-8);">
      <a href="login.html" class="btn btn--ghost btn--sm" style="margin-bottom:var(--sp-5);"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to login</a>
      <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-0.025em;margin-bottom:var(--sp-2);">Reset Password</h1>
      <p style="color:var(--text-secondary);font-size:0.95rem;">Enter your designer email and we will send a reset link.</p>
    </div>
    <form id="forgot-form" novalidate style="display:flex;flex-direction:column;gap:var(--sp-4);">
      <label style="display:flex;flex-direction:column;gap:var(--sp-2);font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);">Email address<input id="forgot-email" type="email" autocomplete="email" required style="background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--r-md);padding:12px var(--sp-4);font-size:0.9rem;color:var(--text-primary);min-height:48px;"></label>
      <div id="forgot-message" role="alert" style="display:none;border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4);font-size:0.85rem;"></div>
      <button class="btn btn--primary" type="submit" style="justify-content:center;">Send reset link</button>
    </form>
  </div>
</section>
</main>
<script src="../assets/js/main.js?v=20260411r1"></script>
<script>
(function () {
  const form = document.getElementById('forgot-form');
  const email = document.getElementById('forgot-email');
  const msg = document.getElementById('forgot-message');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
    msg.style.display = 'block';
    if (!valid) {
      msg.style.background = 'rgba(232,84,84,0.1)';
      msg.style.border = '1px solid rgba(232,84,84,0.3)';
      msg.style.color = '#e05555';
      msg.textContent = 'Enter a valid email address to receive the reset link.';
      return;
    }
    msg.style.background = 'rgba(74,124,0,0.12)';
    msg.style.border = '1px solid rgba(74,124,0,0.3)';
    msg.style.color = 'var(--text-primary)';
    msg.textContent = 'Reset instructions sent to ' + email.value.trim() + '.';
  });
})();
</script>
</body>
</html>
